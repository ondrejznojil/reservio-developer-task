services:
    app:
        build:
            context: ./backend
            dockerfile: Dockerfile
            args:
                MAKEFILE_UID: ${MAKEFILE_UID}
                MAKEFILE_GID: ${MAKEFILE_GID}
        volumes:
            - ./backend:/app
        working_dir: /app
        env_file:
            - ./backend/.env.local

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
            target: deps
        volumes:
            - ./frontend:/app
            - frontend_node_modules:/app/node_modules
            - frontend_next:/app/.next
        working_dir: /app
        env_file:
            - ./frontend/.env.local
        command: sh -c 'yarn install && yarn dev'

volumes:
    frontend_node_modules:
    frontend_next:
